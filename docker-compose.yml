version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: b2b_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: b2b_task_tracker
    volumes:
      - mongodb_data:/data/db
    networks:
      - b2b_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: b2b_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/b2b_task_tracker?authSource=admin
      JWT_SECRET: prod_jwt_secret_change_this
      JWT_REFRESH_SECRET: prod_refresh_secret_change_this
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - b2b_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: b2b_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - b2b_network

volumes:
  mongodb_data:

networks:
  b2b_network:
    driver: bridge
